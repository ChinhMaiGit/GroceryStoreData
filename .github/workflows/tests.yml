name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pytest:
    runs-on: ubuntu-latest
    # the suite runs real multi-year simulations (not mocks), so this is
    # a slow job by design — see package/README.md's Testing section
    timeout-minutes: 60
    defaults:
      run:
        working-directory: package
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: package/pyproject.toml

      - name: Install grocery_sim with test dependencies
        run: pip install -e ".[test]"

      - name: Run the regression suite
        run: pytest -v
